name: Notificacion NTFY

on:
  push:
    branches:
      - main

jobs:
  notificar:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar notificacion
        run: |
          curl -H "Title: Nuevo Push" \
               -H "Priority: high" \
               -d "Se ha realizado un push al repositorio en la rama main." \
               https://ntfy.sh/devops-itla
